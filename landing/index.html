<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Batta</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Funnel+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Funnel Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    .landing {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .bg {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-top: -5vh;
    }

    .top-banner {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 24px;
      opacity: 0;
      animation: fadeDown 1s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
    }

    .top-banner span {
      font-size: clamp(14px, 2vw, 20px);
      font-weight: 400;
      letter-spacing: 0.08em;
      color: #ffffff;
      text-shadow: 0 1px 12px rgba(0, 0, 0, 0.08);
    }

    .title {
      font-weight: 400;
      font-size: clamp(72px, 14vw, 180px);
      letter-spacing: -0.02em;
      line-height: 0.95;
      color: #ffffff;
      margin-top: 4px;
      text-shadow: 0 2px 40px rgba(0, 0, 0, 0.12);
      opacity: 0;
      animation: rise 1.1s cubic-bezier(0.16, 1, 0.3, 1) 0.25s forwards;
    }

    .tagline {
      font-size: clamp(16px, 2.5vw, 24px);
      font-weight: 300;
      letter-spacing: 0.03em;
      color: #ffffff;
      margin-top: 8px;
      opacity: 0;
      animation: rise 1s cubic-bezier(0.16, 1, 0.3, 1) 0.38s forwards;
    }

    .cta {
      margin-top: 28px;
      opacity: 0;
      animation: rise 1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      background: #ffffff;
      color: #4e6a3a;
      font-family: 'Funnel Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.04em;
      padding: 14px 32px;
      border-radius: 9999px;
      border: none;
      cursor: pointer;
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .btn:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 8px 24px rgba(255, 255, 255, 0.3);
    }

    .btn:active { transform: translateY(0) scale(1.01); }

    /* ── Modal ──────────────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(78, 66, 52, 0.35);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      background: #faf5ed;
      border-radius: 24px;
      padding: 44px 40px 40px;
      width: 90%;
      max-width: 440px;
      box-shadow: 0 24px 64px rgba(78, 66, 52, 0.2), 0 0 0 1px rgba(196, 168, 120, 0.15);
      transform: translateY(20px) scale(0.97);
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .modal-overlay.open .modal {
      transform: translateY(0) scale(1);
    }

    .modal-title {
      font-size: 22px;
      font-weight: 600;
      color: #3d3529;
      margin-bottom: 6px;
    }

    .modal-sub {
      font-size: 14px;
      color: #a08b78;
      margin-bottom: 28px;
    }

    .modal-row {
      display: flex;
      gap: 12px;
    }

    .modal-field {
      display: flex;
      flex-direction: column;
      flex: 1;
      margin-bottom: 16px;
    }

    .modal-field label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.03em;
      color: #5c5040;
      margin-bottom: 6px;
    }

    .modal-field input {
      font-family: 'Funnel Sans', sans-serif;
      font-size: 14px;
      padding: 12px 14px;
      border: 1.5px solid #ddd4c6;
      border-radius: 10px;
      outline: none;
      background: #fff9f2;
      color: #3d3529;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .modal-field input::placeholder {
      color: #c4b8a6;
    }

    .modal-field input:focus {
      border-color: #4e6a3a;
      box-shadow: 0 0 0 3px rgba(78, 106, 58, 0.1);
    }

    .modal-field input.invalid {
      border-color: #c47a5a;
      box-shadow: 0 0 0 3px rgba(196, 122, 90, 0.1);
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }

    .btn-cancel {
      flex: 1;
      font-family: 'Funnel Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 13px 0;
      border-radius: 9999px;
      border: 1.5px solid #ddd4c6;
      background: transparent;
      color: #5c5040;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .btn-cancel:hover {
      background: #f0e8db;
      border-color: #c4b8a6;
    }

    .btn-submit {
      flex: 1;
      font-family: 'Funnel Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 13px 0;
      border-radius: 9999px;
      border: none;
      background: #4e6a3a;
      color: #faf5ed;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.2s;
    }

    .btn-submit:enabled:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(78, 106, 58, 0.3);
    }

    .btn-submit:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .content { margin-top: -8vh; }
      .btn { font-size: 13px; padding: 12px 26px; }
      .modal { padding: 28px 24px 24px; }
      .modal-row { flex-direction: column; gap: 0; }
    }
  </style>
</head>
<body>

  <section class="landing">
    <div class="bg">
      <img src="batta3.png" alt="Serene landscape with mountains, river, and ducks" />
    </div>
    <div class="top-banner">
      <span>Coming soon...</span>
    </div>
    <div class="content">
      <h1 class="title">Batta</h1>
      <p class="tagline">The trust to run faster.</p>
      <div class="cta">
        <button class="btn" id="waitlistBtn">Join the waitlist</button>
      </div>
    </div>
  </section>

  <!-- ── Waitlist Modal ──────────────────────────────────────────────── -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-title">Join the waitlist</div>
      <p class="modal-sub">Be the first to know when Batta launches.</p>
      <form id="waitlistForm" novalidate>
        <div class="modal-row">
          <div class="modal-field">
            <label for="firstName">First name</label>
            <input type="text" id="firstName" placeholder="Jane" required />
          </div>
          <div class="modal-field">
            <label for="lastName">Last name</label>
            <input type="text" id="lastName" placeholder="Doe" required />
          </div>
        </div>
        <div class="modal-field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="jane@example.com" required />
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-cancel" id="modalCancel">Cancel</button>
          <button type="submit" class="btn-submit" id="modalSubmit" disabled>Submit</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const overlay = document.getElementById('modalOverlay');
    const form = document.getElementById('waitlistForm');
    const firstName = document.getElementById('firstName');
    const lastName = document.getElementById('lastName');
    const email = document.getElementById('email');
    const submitBtn = document.getElementById('modalSubmit');
    const waitlistBtn = document.getElementById('waitlistBtn');

    function isValidEmail(v) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
    }

    function validate() {
      const valid = firstName.value.trim() && lastName.value.trim() && isValidEmail(email.value.trim());
      submitBtn.disabled = !valid;
    }

    [firstName, lastName, email].forEach(input => {
      input.addEventListener('input', validate);
    });

    // Mark email field if invalid on blur
    email.addEventListener('blur', function () {
      if (this.value.trim() && !isValidEmail(this.value.trim())) {
        this.classList.add('invalid');
      } else {
        this.classList.remove('invalid');
      }
    });
    email.addEventListener('input', function () {
      this.classList.remove('invalid');
    });

    // Open modal
    waitlistBtn.addEventListener('click', function () {
      overlay.classList.add('open');
    });

    // Close modal
    document.getElementById('modalCancel').addEventListener('click', function () {
      overlay.classList.remove('open');
    });

    overlay.addEventListener('click', function (e) {
      if (e.target === overlay) overlay.classList.remove('open');
    });

    // Submit
    form.addEventListener('submit', function (e) {
      e.preventDefault();
      overlay.classList.remove('open');
      waitlistBtn.textContent = "You're on the list \u2713";
      waitlistBtn.style.background = '#4e6a3a';
      waitlistBtn.style.color = '#faf5ed';
      waitlistBtn.style.pointerEvents = 'none';
      form.reset();
      submitBtn.disabled = true;
    });
  </script>
</body>
</html>
